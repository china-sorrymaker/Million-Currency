name: Million-App-Base-AutoBuilder

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Languages
        run: python language_init.py

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode Keystore
        # 这里是解决 "Password is not ASCII" 和 "invalid input" 的关键
        run: echo "${{ secrets.SIGNING_KEY }}" | tr -d '\n ' | base64 --decode > release-key.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Million-Currency-APK
          path: app/build/outputs/apk/release/*.apk
